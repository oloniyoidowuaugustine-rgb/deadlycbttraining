<!-- SUBJECT TABS -->

const questionBanks = { math, english, physics, chemistry, furthermaths,biology, };

// Exam state
let examQuestions = {}; // holds 40 random per subject
let userAnswers = {};   // holds answers per subject

// === SUBJECT SELECTION & START ===
function startSelectedSubjects(){
  selectedSubjects = Array.from(document.querySelectorAll('#subjectSelection input:checked')).map(cb => cb.value);
  if(selectedSubjects.length===0){ alert("Select at least one subject"); return; }
  document.getElementById('subjectSelection').style.display='none';
  document.getElementById('examContainer').style.display='block';

  // Initialize questions & answers
  selectedSubjects.forEach(subj=>{
    const bank = questionBanks[subj];
    const shuffled = [...bank].sort(()=>0.5 - Math.random());
    examQuestions[subj] = shuffled.slice(0, NUM_QUESTIONS);
    userAnswers[subj] = Array(NUM_QUESTIONS).fill(null);
  });

  createSubjectTabs();
  currentSubject = selectedSubjects[0];
  currentIndex = 0;
  displayQuestion();
  startTimer();
}

// CREATE TABS BASED ON SELECTION
function createSubjectTabs(){
  const tabsDiv = document.getElementById('subjectTabs');
  tabsDiv.innerHTML='';
  selectedSubjects.forEach(subj=>{
    const btn = document.createElement('button');
    btn.innerText = subj.charAt(0).toUpperCase() + subj.slice(1);
    btn.id = 'tab-' + subj;
    btn.onclick = ()=> switchSubject(subj);
    tabsDiv.appendChild(btn);
  });
  switchSubject(selectedSubjects[0]);
}

// SWITCH SUBJECT
function switchSubject(subj){
  currentSubject = subj;
  currentIndex = 0;
  document.querySelectorAll('#subjectTabs button').forEach(btn=>btn.classList.remove('active'));
  document.getElementById('tab-'+subj).classList.add('active');
  displayQuestion();
}

// TIMER
function startTimer(){
  clearInterval(timerInterval);
  timeLeft = 3600;
  timerInterval = setInterval(()=>{
    let mins = Math.floor(timeLeft/60);
    let secs = timeLeft%60;
    document.getElementById("timeDisplay").innerText = `${mins}:${secs<10?'0':''}${secs}`;
    timeLeft--;
    if(timeLeft<0){ clearInterval(timerInterval); alert("Time up!"); submitExam(); }
  },1000);
}

// DISPLAY QUESTION
function displayQuestion(){
  const q = examQuestions[currentSubject][currentIndex];
  document.getElementById("questionText").innerText=`Q${currentIndex+1}. ${q.q}`;
  document.getElementById("optionA").innerText=q.options[0];
  document.getElementById("optionB").innerText=q.options[1];
  document.getElementById("optionC").innerText=q.options[2];
  document.getElementById("optionD").innerText=q.options[3];
  document.querySelectorAll(".option").forEach(btn=>btn.classList.remove("selected"));
  if(userAnswers[currentSubject][currentIndex] != null){
    document.getElementById("option"+String.fromCharCode(65+userAnswers[currentSubject][currentIndex])).classList.add("selected");
  }
  updateNavBar();
}

// SELECT ANSWER
function selectAnswer(i){
  userAnswers[currentSubject][currentIndex] = i;
  displayQuestion();
}

// NAVIGATION
function nextQuestion(){ if(currentIndex<NUM_QUESTIONS-1){ currentIndex++; displayQuestion(); } }
function prevQuestion(){ if(currentIndex>0){ currentIndex--; displayQuestion(); } }
function jumpToQuestion(i){ if(i>=0 && i<NUM_QUESTIONS){ currentIndex=i; displayQuestion(); } }

// NAV BAR
function updateNavBar(){
  const nav = document.getElementById("navBar");
  nav.innerHTML="";
  examQuestions[currentSubject].forEach((_,i)=>{
    const btn = document.createElement("button");
    btn.innerText=i+1;
    if(userAnswers[currentSubject][i]!=null) btn.classList.add("answered");
    btn.onclick = ()=>jumpToQuestion(i);
    nav.appendChild(btn);
  });
}

// SUBMIT EXAM
function submitExam(){
  clearInterval(timerInterval);
  let totalCorrect = 0;
  for(const subj of selectedSubjects){
    examQuestions[subj].forEach((q,i)=>{
      if(userAnswers[subj][i]===q.answer) totalCorrect++;
    });
  }
  // Scale score over 400
  let scaledScore = totalCorrect * 2.5; // 160 max → 400
  alert(`Your total score: ${scaledScore}/400`);
  location.reload();
}
</script>
